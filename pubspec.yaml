name: movie_time
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Bazooka
      fonts:
        - asset: assets/fonts/bazooka.ttf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"